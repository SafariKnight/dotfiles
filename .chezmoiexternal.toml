[".tmux/plugins/tpm"]
    type = "archive"
    url = "https://github.com/tmux-plugins/tpm/archive/master.tar.gz"
    stripComponents = 1
    refreshPeriod = "168h"

[".config/mpv/scripts/thumbfast.lua"]
    type = "file"
    url = "https://raw.githubusercontent.com/po5/thumbfast/refs/heads/master/thumbfast.lua"
    refreshPeriod = "168h"

[".config/mpv/script-opts/thumbfast.conf"]
    type = "file"
    url = "https://raw.githubusercontent.com/po5/thumbfast/refs/heads/master/thumbfast.conf"
    refreshPeriod = "168h"
