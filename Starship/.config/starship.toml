# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false

format = '''
\[$directory\] $git_branch
$character
'''

[character]
success_symbol = '[пђІ](bold green)'
error_symbol = '[пђІ](bold red)'
vimcmd_symbol = '[пђґ](bold green)'
vimcmd_replace_one_symbol = '[пђґ](bold purple)'
vimcmd_replace_symbol = '[пђґ](bold purple)'
vimcmd_visual_symbol = '[пђґ](bold yellow)'

[directory]
truncation_length = 8
format = '[$path]($style)[$read_only]($read_only_style)'
read_only = ': пЂЈ'
read_only_style = "red"

[git_branch]
format = '\([$symbol$branch(:$remote_branch)]($style)\)'
